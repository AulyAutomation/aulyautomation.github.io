<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #232323;
      --black: #000000;
      --green: #00d09e;
      --white: #ffffff;
      --card: #5f5f61;
      --card-featured: #99a8a5;
      --text-muted: #6b6b6b;
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--bg);
      font-family: 'Cormorant SC', serif;
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }
    header {
      width: 100%;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .logo-balk {
      width: 100%;
      background-color: var(--bg);
      padding: 0;
      margin: 0;
      line-height: 0;
    }
    .logo-balk img {
      width: 100%;
      height: 100px;
      object-fit: fill;
      display: block;
    }
    nav {
      width: 100%;
      height: 50px;
      background-color: var(--black);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 60px;
    }
    nav a {
      color: var(--white);
      text-decoration: none;
      font-family: 'Cormorant SC', serif;
      font-size: 15px;
      letter-spacing: 2.5px;
      font-weight: 400;
      margin-left: 50px;
      position: relative;
      transition: color 0.3s ease;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--green);
      transition: width 0.3s ease;
    }
    nav a:hover { color: var(--green); }
    nav a:hover::after { width: 100%; }

    .services-sectie {
      padding: 80px 60px;
      text-align: center;
    }

    .sectie-titel {
      font-family: 'Cormorant SC', serif;
      font-size: 13px;
      letter-spacing: 4px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 60px;
    }

    .services-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      max-width: 800px;
      margin: 0 auto;
    }

    .service-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--green);
      border-radius: 12px;
      padding: 50px 60px;
      text-align: left;
      opacity: 0;
      transform: translateY(30px);
      transition: box-shadow 0.4s ease, transform 0.4s ease;
    }

    .service-card:nth-child(1) { animation: fadeUp 0.8s ease 0.3s forwards; }
    .service-card:nth-child(2) { animation: fadeUp 0.8s ease 0.5s forwards; }
    .service-card:nth-child(3) { animation: fadeUp 0.8s ease 0.7s forwards; }

    .service-card:last-child {
      background: var(--card-featured);
      border-color: var(--white);
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0, 208, 158, 0.15);
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .service-card h3 {
      color: var(--green);
      font-family: 'Cormorant SC', serif;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .service-card:last-child h3 { color: var(--white); }

    .service-prijs {
      font-family: 'Cormorant SC', serif;
      font-size: 28px;
      color: var(--green);
      letter-spacing: 2px;
    }

    .service-card:last-child .service-prijs { color: var(--white); }

    .service-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 20px 0;
    }
