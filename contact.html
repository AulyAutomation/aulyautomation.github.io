<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuLy – Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;500;600;700&family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #232323;
      --black: #000000;
      --green: #00d09e;
      --white: #ffffff;
      --card: #5f5f61;
      --card-featured: #99a8a5;
      --text-muted: #6b6b6b;
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--bg);
      font-family: 'Cormorant SC', serif;
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }
    header {
      width: 100%;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .logo-balk {
      width: 100%;
      background-color: var(--bg);
      padding: 0;
      margin: 0;
      line-height: 0;
    }
    .logo-balk img {
      width: 100%;
      height: 100px;
      object-fit: fill;
      display: block;
    }
    nav {
      width: 100%;
      height: 50px;
      background-color: var(--black);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 60px;
    }
    nav a {
      color: var(--white);
      text-decoration: none;
      font-family: 'Cormorant SC', serif;
      font-size: 15px;
      letter-spacing: 2.5px;
      font-weight: 400;
      margin-left: 50px;
      position: relative;
      transition: color 0.3s ease;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--green);
      transition: width 0.3s ease;
    }
    nav a:hover { color: var(--green); }
    nav a:hover::after { width: 100%; }
    .contact-sectie {
      padding: 120px 20px;
      text-align: center;
    }
    .contact-titel {
      font-family: 'Cormorant SC', serif;
      font-size: clamp(28px, 4vw, 48px);
      color: var(--white);
      letter-spacing: 3px;
      margin-bottom: 60px;
    }
    .contact-knoppen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .contact-knop {
      display: inline-block;
      padding: 16px 60px;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Cormorant SC', serif;
      font-size: 18px;
      letter-spacing: 3px;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .contact-knop:hover {
      background: var(--green);
      color: var(--black);
    }
    footer {
      background: var(--bg);
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    footer p {
      font-family: 'Cormorant', serif;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
    }
    @media (max-width: 768px) {
  .producten-grid {
    flex-direction: column;
  }

  .why-sectie,
  .pakketten-sectie,
  .services-sectie {
    padding: 20px 20px;
  }

  .usp-groot-item {
    width: 100%;
  }

  .service-card {
    padding: 30px 24px;
  }

  nav {
    padding: 0 20px;
  }

  nav a {
    margin-left: 20px;
    font-size: 12px;
  }

  .visie-blok,
  .doelgroep-blok {
    padding: 30px 24px;
  }

  .visie-sectie {
    padding: 60px 20px;
  }

  .contact-knoppen {
    padding: 0 20px;
  }

  .contact-knop {
    padding: 16px 30px;
    width: 100%;
    text-align: center;
  }
}
  </style>
</head>
<body>
  <header>
    <div class="logo-balk">
      <img src="Auly base logo.png" alt="AuLy logo" />
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="visie.html">Vision</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="contact-sectie">
    <h2 class="contact-titel">Get In Touch</h2>
    <div class="contact-knoppen">
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdi5MVtbezCQqXqUniRk29dVWORbH2wIA48rsVlroSBx6RJMA/viewform" target="_blank" class="contact-knop">Contact Form</a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSfX57aqQdY21zUwip8hHJ8ArQIH4Yy25X4kk2NklvO6d9Vapg/viewform?usp=header" target="_blank" class="contact-knop">Request Appointment</a>
    </div>
  </section>

  <footer>
    <p>© 2025 AuLy · info@auly.ink</p>
  </footer>
</body>
</html>
