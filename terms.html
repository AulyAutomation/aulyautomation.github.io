<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuLy – Terms & Conditions</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #232323;
      --black: #000000;
      --green: #00d09e;
      --white: #ffffff;
      --card: #5f5f61;
      --text-muted: #6b6b6b;
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }
    header {
      width: 100%;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .logo-balk { width: 100%; background-color: var(--bg); padding: 0; margin: 0; line-height: 0; }
    .logo-balk img { width: 100%; height: 100px; object-fit: contain; display: block; }
    nav {
      width: 100%;
      height: 50px;
      background-color: var(--black);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 60px;
    }
    nav a {
      color: var(--white);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      letter-spacing: 2.5px;
      font-weight: 400;
      margin-left: 50px;
      position: relative;
      transition: color 0.3s ease;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--green);
      transition: width 0.3s ease;
    }
    nav a:hover { color: var(--green); }
    nav a:hover::after { width: 100%; }

    .terms-sectie {
      padding: 100px 20px 120px;
      text-align: center;
      max-width: 700px;
      margin: 0 auto;
    }

    .terms-titel {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(24px, 3vw, 40px);
      color: var(--white);
      letter-spacing: 3px;
      margin-bottom: 16px;
    }

    .terms-subtitel {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      margin-bottom: 60px;
      line-height: 1.6;
    }

    .terms-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .terms-knop {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      width: 100%;
      max-width: 500px;
      padding: 20px 32px;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      letter-spacing: 1.5px;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .terms-knop:hover {
      background: var(--green);
      color: var(--black);
    }

    .terms-knop span { text-align: left; }
    .terms-knop .arrow { font-size: 18px; flex-shrink: 0; }

    footer {
      background: var(--bg);
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    footer p {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
    }
    footer a {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-decoration: none;
      display: block;
      margin-top: 8px;
    }
    footer a:hover { color: var(--green); }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      nav a { margin-left: 20px; font-size: 12px; }
      .logo-balk img { height: 90px; }
      .terms-knop { padding: 16px 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-balk">
      <img src="Auly base logo.png" alt="AuLy logo" />
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="visie.html">Vision</a>
      <a href="contact.html">Contact</a>
      <a href="inaction.html">In Action</a>
    </nav>
  </header>

  <section class="terms-sectie">
    <h2 class="terms-titel">Terms & Conditions</h2>
    <p class="terms-subtitel">Please read our terms carefully before booking a session or purchasing a service.</p>
    <div class="terms-grid">
      <a href="general terms and conditions.pdf" target="_blank" class="terms-knop">
        <span>General Terms & Conditions</span>
        <span class="arrow">↓</span>
      </a>
      <a href="post delivery support terms.pdf" target="_blank" class="terms-knop">
        <span>Post-Delivery Support Terms</span>
        <span class="arrow">↓</span>
      </a>
    </div>
  </section>

  <footer>
    <p>© 2025 AuLy Automation</p>
    <a href="terms.html">AuLy Terms & Conditions</a>
  </footer>
</body>
</html>
